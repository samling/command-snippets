name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          ldflags="-w -s -X github.com/samling/command-snippets/internal/cmd.version=${GITHUB_REF_NAME}"
          go build -trimpath -ldflags="${ldflags}" -o "dist/cs${{ matrix.ext }}" ./cmd/cs

      - name: Package
        working-directory: dist
        run: |
          name="cs-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            archive="${name}.zip"
            zip "${archive}" "cs${{ matrix.ext }}"
          else
            archive="${name}.tar.gz"
            tar -czf "${archive}" "cs${{ matrix.ext }}"
          fi
          sha256sum "${archive}" > "${archive}.sha256"
          rm "cs${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: cs-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
